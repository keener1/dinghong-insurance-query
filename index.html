<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鼎鸿保险经纪费用查询</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: #f5f6fa;
  color: #333;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ===== 登录页 ===== */
.login-page {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
}
.login-card {
  background: #fff;
  border-radius: 16px;
  padding: 40px 28px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
}
.login-card h2 {
  text-align: center;
  font-size: 22px;
  color: #222;
  margin-bottom: 6px;
}
.login-card .login-sub {
  text-align: center;
  font-size: 13px;
  color: #999;
  margin-bottom: 30px;
}
.login-field {
  margin-bottom: 18px;
}
.login-field label {
  display: block;
  font-size: 13px;
  color: #666;
  margin-bottom: 6px;
  font-weight: 500;
}
.login-field input {
  width: 100%;
  height: 46px;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 0 14px;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
  background: #fafafa;
}
.login-field input:focus {
  border-color: #1a73e8;
  background: #fff;
}
.login-remember {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 24px;
  font-size: 13px;
  color: #666;
}
.login-remember input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #1a73e8;
}
.login-btn {
  width: 100%;
  height: 48px;
  background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.login-btn:active { opacity: 0.85; }
.login-error {
  text-align: center;
  color: #d32f2f;
  font-size: 13px;
  margin-top: 16px;
  display: none;
}

/* ===== 主页面 ===== */
.main-page { display: none; }

/* 顶部 */
.header {
  background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
  padding: 16px;
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.update-time {
  font-size: 11px;
  opacity: 0.7;
}
.logout-btn {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.15);
  border: none;
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
}

/* 搜索栏 */
.search-wrap {
  padding: 12px 16px;
  position: sticky;
  top: 56px;
  z-index: 99;
  background: #f5f6fa;
}
.search-box {
  display: flex;
  align-items: center;
  background: #fff;
  border-radius: 10px;
  padding: 0 14px;
  height: 44px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-box svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  color: #999;
}
.search-box input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 15px;
  padding: 0 10px;
  background: transparent;
  color: #333;
}
.search-box input::placeholder { color: #bbb; }
.search-clear {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #ddd;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #fff;
  cursor: pointer;
  flex-shrink: 0;
}

/* 筛选标签 */
.filter-wrap {
  padding: 0 16px 8px;
  position: sticky;
  top: 112px;
  z-index: 98;
  background: #f5f6fa;
}
.filter-tags {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
}
.filter-tags::-webkit-scrollbar { display: none; }
.filter-tag {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  background: #fff;
  color: #666;
  border: 1px solid #e0e0e0;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-tag.active {
  background: #1a73e8;
  color: #fff;
  border-color: #1a73e8;
}

/* 统计 */
.stats {
  padding: 8px 16px 4px;
  font-size: 12px;
  color: #999;
}

/* 产品列表 */
.product-list {
  padding: 4px 16px 80px;
}
.product-card {
  background: #fff;
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.product-header {
  padding: 14px 14px 10px;
}
.product-name {
  font-size: 15px;
  font-weight: 600;
  color: #222;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.product-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 500;
}
.tag-type {
  background: #e8f0fe;
  color: #1a73e8;
}
.tag-attr {
  background: #fef7e0;
  color: #f9a825;
}

/* 费用展开 */
.product-fees {
  padding: 0 14px 14px;
  display: none;
}
.product-card.expanded .product-fees { display: block; }
.product-card.expanded .expand-icon { transform: rotate(180deg); }
.product-card.expanded .expand-text::after { content: '收起'; }

.fee-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.fee-table th {
  background: #f8f9fa;
  padding: 8px 4px;
  text-align: center;
  font-weight: 500;
  color: #666;
  border-bottom: 1px solid #eee;
  font-size: 11px;
}
.fee-table td {
  padding: 8px 4px;
  text-align: center;
  border-bottom: 1px solid #f5f5f5;
  color: #333;
  font-size: 12px;
}
.fee-table tr:last-child td { border-bottom: none; }
.fee-table .fee-val {
  font-weight: 600;
  color: #d32f2f;
}
.fee-table .fee-zero { color: #ccc; }

/* 展开按钮 */
.expand-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  color: #1a73e8;
  font-size: 13px;
  cursor: pointer;
  border-top: 1px solid #f5f5f5;
  gap: 4px;
}
.expand-icon {
  width: 16px;
  height: 16px;
  transition: transform 0.2s;
}

/* 空状态 */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #999;
}
.empty-state svg {
  width: 64px;
  height: 64px;
  color: #ddd;
  margin-bottom: 16px;
}
.empty-state p { font-size: 14px; }

/* loading */
.loading {
  text-align: center;
  padding: 40px;
  color: #999;
  font-size: 14px;
}
.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid #e0e0e0;
  border-top-color: #1a73e8;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 返回顶部 */
.back-top {
  position: fixed;
  right: 16px;
  bottom: 24px;
  width: 40px;
  height: 40px;
  background: #1a73e8;
  color: #fff;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 10px rgba(26,115,232,0.3);
  cursor: pointer;
  z-index: 200;
}
.back-top.show { display: flex; }
.back-top svg { width: 20px; height: 20px; }
</style>
</head>
<body>

<!-- 登录页 -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <h2>鼎鸿保险经纪</h2>
    <p class="login-sub">产品费用查询系统</p>
    <div class="login-field">
      <label>账号</label>
      <input type="text" id="loginUser" placeholder="请输入账号" autocomplete="username" />
    </div>
    <div class="login-field">
      <label>密码</label>
      <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password" />
    </div>
    <div class="login-remember">
      <input type="checkbox" id="rememberMe" checked />
      <label for="rememberMe">记住账号</label>
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">登 录</button>
    <div class="login-error" id="loginError">账号或密码错误</div>
  </div>
</div>

<!-- 主页面 -->
<div class="main-page" id="mainPage">

<div class="header">
  <div class="header-top">
    <h1>鼎鸿保险经纪费用查询</h1>
    <div class="header-right">
      <span class="update-time" id="updateTime"></span>
      <button class="logout-btn" onclick="doLogout()">退出</button>
    </div>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="搜索产品名称、险种..." />
    <div class="search-clear" id="searchClear">×</div>
  </div>
</div>

<div class="filter-wrap">
  <div class="filter-tags" id="filterTags"></div>
</div>

<div class="stats" id="stats"></div>

<div class="product-list" id="productList">
  <div class="loading"><div class="spinner"></div>加载中...</div>
</div>

<div class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
</div>

</div><!-- /main-page -->

<script>
// ===== 认证配置（请修改为你自己的账号密码） =====
// 密码使用简单hash，防止明文存储在源码中
const AUTH_CONFIG = {
  // 用户名 -> 密码的简单hash
  // 默认账号: dh / 密码: dh2026
  users: {
    'dh': '00000000b349ee67',
  }
};

function simpleHash(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193);
  }
  return (h >>> 0).toString(16).padStart(16, '0');
}

// ===== 登录逻辑 =====
function checkAuth() {
  const token = localStorage.getItem('dinghong_auth');
  if (token && token === '1') {
    showMain();
    return true;
  }
  showLogin();
  return false;
}

function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('mainPage').style.display = 'none';
  // 回填记住的账号
  const saved = localStorage.getItem('dinghong_user');
  if (saved) {
    document.getElementById('loginUser').value = saved;
    document.getElementById('rememberMe').checked = true;
  }
}

function showMain() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('mainPage').style.display = 'block';
  loadData();
}

function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errorEl = document.getElementById('loginError');

  if (!user || !pass) {
    errorEl.textContent = '请输入账号和密码';
    errorEl.style.display = 'block';
    return;
  }

  const hashed = simpleHash(pass);
  if (AUTH_CONFIG.users[user] && AUTH_CONFIG.users[user] === hashed) {
    errorEl.style.display = 'none';
    localStorage.setItem('dinghong_auth', '1');
    if (document.getElementById('rememberMe').checked) {
      localStorage.setItem('dinghong_user', user);
    } else {
      localStorage.removeItem('dinghong_user');
    }
    showMain();
  } else {
    errorEl.textContent = '账号或密码错误';
    errorEl.style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem('dinghong_auth');
  document.getElementById('loginPass').value = '';
  showLogin();
}

// 回车登录
document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ===== 数据查询 =====
const DATA_URL = 'niubao_products.json';
let allProducts = [];
let currentType = '全部';
let searchTerm = '';

function parseFee(v) {
  if (!v || v === '/') return 0;
  return parseFloat(String(v).replace('%','')) || 0;
}

async function loadData() {
  try {
    const resp = await fetch(DATA_URL);
    const json = await resp.json();
    allProducts = json.products || [];
    document.getElementById('updateTime').textContent = json.updateTime || '';
    initFilters();
    render();
  } catch(e) {
    document.getElementById('productList').innerHTML = '<div class="empty-state"><p>数据加载失败，请稍后重试</p></div>';
  }
}

function initFilters() {
  const types = new Set();
  allProducts.forEach(p => { if(p.type) types.add(p.type); });
  const sorted = ['全部', ...Array.from(types).sort((a,b) => allProducts.filter(p=>p.type===b).length - allProducts.filter(p=>p.type===a).length)];
  const wrap = document.getElementById('filterTags');
  wrap.innerHTML = sorted.map(t =>
    `<div class="filter-tag${t==='全部'?' active':''}" data-type="${t}">${t}</div>`
  ).join('');
  wrap.addEventListener('click', e => {
    const tag = e.target.closest('.filter-tag');
    if (!tag) return;
    wrap.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
    tag.classList.add('active');
    currentType = tag.dataset.type;
    render();
  });
}

function getFiltered() {
  return allProducts.filter(p => {
    const matchType = currentType === '全部' || p.type === currentType;
    if (!searchTerm) return matchType;
    const s = searchTerm.toLowerCase();
    const matchSearch = (p.name && p.name.toLowerCase().includes(s)) || (p.type && p.type.toLowerCase().includes(s));
    return matchType && matchSearch;
  });
}

function render() {
  const list = getFiltered();
  const container = document.getElementById('productList');
  document.getElementById('stats').textContent = `共 ${list.length} 个产品`;

  if (!list.length) {
    container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>没有找到匹配的产品</p></div>';
    return;
  }

  container.innerHTML = list.map((p, idx) => {
    const years = p.years || [];
    const yearHeaders = years.length ? years.map(y => `<th>${y}</th>`).join('') : '';

    const variantRows = p.variants.map(v => {
      const fees = v.yearly_totals || [];
      const feeCells = fees.map(f => {
        const val = parseFee(f);
        return val > 0 ? `<td class="fee-val">${f}</td>` : `<td class="fee-zero">0</td>`;
      }).join('');
      return `<tr><td style="text-align:left;color:#555">${v.fee_combo || ''}</td>${feeCells}</tr>`;
    }).join('');

    return `<div class="product-card" onclick="this.classList.toggle('expanded')">
      <div class="product-header">
        <div class="product-name">${escHtml(p.name)}</div>
        <div class="product-meta">
          <span class="product-tag tag-type">${escHtml(p.type)}</span>
          ${p.attr ? `<span class="product-tag tag-attr">${escHtml(p.attr)}</span>` : ''}
        </div>
      </div>
      <div class="product-fees">
        <table class="fee-table">
          <thead><tr><th style="text-align:left">缴费方式</th>${yearHeaders}</tr></thead>
          <tbody>${variantRows}</tbody>
        </table>
      </div>
      <div class="expand-bar">
        <span class="expand-text">展开费用明细</span>
        <svg class="expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 搜索
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchTerm = searchInput.value.trim();
    searchClear.style.display = searchTerm ? 'flex' : 'none';
    render();
  }, 200);
});
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchTerm = '';
  searchClear.style.display = 'none';
  render();
});

// 返回顶部
window.addEventListener('scroll', () => {
  const btn = document.getElementById('backTop');
  if (btn) btn.classList.toggle('show', window.scrollY > 400);
});

// 启动
checkAuth();
</script>
</body>
</html>
